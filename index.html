<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nightfall | Bedtime Stories</title>
    <!-- Tailwind CSS for mobile-first, clean UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for premium SVG icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-deep: #0A0F1D;
            --bg-card: #151C2C;
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --accent: #7E90D6;
            --accent-hover: #5A6DB8;
        }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .glass-panel {
            background: rgba(21, 28, 44, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .story-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #CBD5E1;
            white-space: pre-wrap;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 10px;
        }

        #settingsModal {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .modal-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }
        .modal-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <!-- Header -->
    <header class="w-full max-w-2xl flex justify-between items-center mb-8 pt-4">
        <div>
            <h1 class="text-3xl font-light tracking-wide text-[var(--accent)]">Nightfall</h1>
            <p class="text-sm text-[var(--text-muted)]">AI Bedtime Stories</p>
        </div>
        <button id="openSettingsBtn" class="p-3 rounded-full hover:bg-[var(--bg-card)] transition-colors text-[var(--text-muted)] hover:text-white">
            <i class="ph ph-gear text-2xl"></i>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="w-full max-w-2xl flex-1 flex flex-col">
        
        <!-- Setup Screen -->
        <div id="setupScreen" class="glass-panel p-6 rounded-2xl flex flex-col gap-6 shadow-xl">
            <div>
                <label class="block text-sm font-medium text-[var(--text-muted)] mb-2">Choose your theme</label>
                <select id="category" class="w-full bg-[var(--bg-deep)] border border-gray-700 text-white rounded-xl p-4 appearance-none focus:outline-none focus:border-[var(--accent)] transition-colors">
                    <option value="A quiet journey through a bioluminescent forest">Bioluminescent Forest</option>
                    <option value="A peaceful deep-space observation post">Deep Space Observation</option>
                    <option value="A cozy cabin during a gentle snowstorm">Snowy Cabin Retreat</option>
                    <option value="A slow train ride through a magical countryside">Magical Train Ride</option>
                    <option value="A gentle boat ride down a lazy, moonlit river">Moonlit River Cruise</option>
                    <option value="A quiet library inside an ancient castle during a rainstorm">Rainy Castle Library</option>
                </select>
            </div>
            
            <button id="generateBtn" class="w-full py-4 rounded-xl font-medium text-lg bg-[var(--accent)] text-[#0A0F1D] hover:bg-[var(--accent-hover)] active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                <i class="ph ph-sparkle text-xl"></i> Write My Story
            </button>
            <p id="setupStatus" class="text-center text-sm text-[var(--accent)] h-6"></p>
        </div>

        <!-- Player Screen -->
        <div id="playerScreen" class="hidden flex-col gap-6 h-full">
            <div class="glass-panel p-4 rounded-2xl shadow-2xl sticky top-4 z-10 flex flex-col gap-4">
                <div class="flex justify-between items-center px-2">
                    <span id="playerStatus" class="text-sm font-medium text-[var(--accent)]">Story Ready</span>
                    <button id="backBtn" class="text-sm text-[var(--text-muted)] hover:text-white transition-colors">New Story</button>
                </div>
                
                <div class="flex justify-center items-center gap-6">
                    <button id="stopBtn" class="p-4 rounded-full bg-[var(--bg-card)] text-white hover:text-red-400 transition-colors">
                        <i class="ph-fill ph-stop text-2xl"></i>
                    </button>
                    <button id="playPauseBtn" class="p-5 rounded-full bg-[var(--accent)] text-[#0A0F1D] hover:bg-[var(--accent-hover)] transition-colors shadow-lg shadow-[#7E90D6]/20">
                        <i id="playIcon" class="ph-fill ph-play text-3xl"></i>
                    </button>
                </div>
            </div>

            <div id="storyOutput" class="story-text px-2 pb-24 mt-4"></div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-center items-center p-4 modal-hidden">
        <div class="bg-[var(--bg-card)] w-full max-w-md rounded-2xl p-6 shadow-2xl border border-gray-700 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">Settings</h2>
                <button id="closeSettingsBtn" class="text-[var(--text-muted)] hover:text-white">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>
            
            <div class="flex flex-col gap-6">
                <!-- API Key Section -->
                <div>
                    <label class="block text-sm text-[var(--text-muted)] mb-2">Gemini API Key</label>
                    <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-[var(--bg-deep)] border border-gray-700 text-white rounded-xl p-4 focus:outline-none focus:border-[var(--accent)] transition-colors">
                    <p class="text-xs text-[var(--text-muted)] mt-2">Stored securely on your device.</p>
                </div>

                <!-- Voice Selector Section -->
                <div>
                    <label class="block text-sm text-[var(--text-muted)] mb-2">Reader Voice</label>
                    <select id="voiceSelect" class="w-full bg-[var(--bg-deep)] border border-gray-700 text-white rounded-xl p-4 appearance-none focus:outline-none focus:border-[var(--accent)] transition-colors">
                        <option value="">Loading voices...</option>
                    </select>
                    <p class="text-xs text-[var(--text-muted)] mt-2">Network/Online voices usually sound more natural than local ones.</p>
                    <button id="testVoiceBtn" class="mt-3 w-full py-2 rounded-lg text-sm border border-gray-600 text-[var(--text-main)] hover:bg-[var(--bg-deep)] transition-colors">
                        Test Voice
                    </button>
                </div>

                <button id="saveSettingsBtn" class="w-full py-3 mt-2 rounded-xl font-medium bg-[var(--accent)] text-[#0A0F1D] hover:bg-[var(--accent-hover)] transition-colors">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        // UI Elements
        const setupScreen = document.getElementById('setupScreen');
        const playerScreen = document.getElementById('playerScreen');
        const settingsModal = document.getElementById('settingsModal');
        
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        
        const apiKeyInput = document.getElementById('apiKey');
        const voiceSelect = document.getElementById('voiceSelect');
        const testVoiceBtn = document.getElementById('testVoiceBtn');
        
        const generateBtn = document.getElementById('generateBtn');
        const setupStatus = document.getElementById('setupStatus');
        const categorySelect = document.getElementById('category');
        
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const stopBtn = document.getElementById('stopBtn');
        const backBtn = document.getElementById('backBtn');
        const playerStatus = document.getElementById('playerStatus');
        const storyOutput = document.getElementById('storyOutput');

        // State Variables
        const synth = window.speechSynthesis;
        let voices = [];
        let storyChunks = [];
        let currentChunkIndex = 0;
        let isPlaying = false;
        let isPaused = false; 

        // --- Voice Loading & Population ---
        function populateVoiceList() {
            voices = synth.getVoices();
            if (voices.length === 0) return;

            // Filter for mostly English voices to keep the list clean
            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            
            voiceSelect.innerHTML = '';
            
            englishVoices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} ${voice.localService ? '(Local)' : '(Network)'}`;
                option.value = voice.voiceURI;
                voiceSelect.appendChild(option);
            });

            // Load saved voice or try to find a good default
            const savedVoiceURI = localStorage.getItem('gemini_selected_voice');
            if (savedVoiceURI) {
                voiceSelect.value = savedVoiceURI;
            } else {
                // Try to find a good default network female voice
                const defaultVoice = englishVoices.find(v => 
                    v.name.includes('Google UK English Female') || 
                    (v.name.includes('Google') && !v.localService)
                );
                if (defaultVoice) voiceSelect.value = defaultVoice.voiceURI;
            }
        }

        // Voices load asynchronously in some browsers
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // Test Voice Button
        testVoiceBtn.addEventListener('click', () => {
            const selectedURI = voiceSelect.value;
            const voice = voices.find(v => v.voiceURI === selectedURI);
            if (voice) {
                synth.cancel();
                const utterance = new SpeechSynthesisUtterance("This is how I will read your bedtime story. Take a deep breath, and relax.");
                utterance.voice = voice;
                utterance.rate = 0.85; // slightly slower for bedtime feel
                utterance.pitch = 0.9;
                synth.speak(utterance);
            }
        });

        // 1. App Initialization & Settings
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) apiKeyInput.value = savedKey;
        });

        openSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('modal-hidden');
            settingsModal.classList.add('modal-visible');
            populateVoiceList(); // Refresh list just in case
        });

        const closeSettings = () => {
            synth.cancel(); // Stop test voice if playing
            settingsModal.classList.remove('modal-visible');
            settingsModal.classList.add('modal-hidden');
        };
        
        closeSettingsBtn.addEventListener('click', closeSettings);
        
        saveSettingsBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) localStorage.setItem('gemini_api_key', key);
            
            const selectedVoiceURI = voiceSelect.value;
            if (selectedVoiceURI) localStorage.setItem('gemini_selected_voice', selectedVoiceURI);
            
            closeSettings();
        });

        // 2. Generation Logic
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                openSettingsBtn.click();
                alert("Please enter your Gemini API Key first.");
                return;
            }

            try {
                generateBtn.disabled = true;
                generateBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Writing...';
                setupStatus.innerText = "Connecting to Gemini...";

                const modelName = await getValidModel(apiKey);
                
                setupStatus.innerText = "Crafting a long, soothing story... (Please wait)";
                const storyText = await fetchStoryFromAPI(apiKey, modelName, categorySelect.value);
                
                storyOutput.innerText = storyText;
                
                let spokenText = storyText.replace(/\*/g, '');
                spokenText = spokenText.replace(/[\r\n]+/g, ' ');
                storyChunks = spokenText.split(/(?<=[.!?])\s+(?=[A-Z"'])/);
                storyChunks = storyChunks.filter(chunk => chunk.trim().length > 0);
                currentChunkIndex = 0;
                
                setupScreen.classList.add('hidden');
                playerScreen.classList.remove('hidden');
                playerScreen.classList.add('flex');
                
                isPlaying = false;
                isPaused = false;
                updatePlayButtonUI();
                playerStatus.innerText = "Story Ready. Press Play to begin.";

            } catch (error) {
                setupStatus.innerText = `Error: ${error.message}`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="ph ph-sparkle text-xl"></i> Write My Story';
            }
        });

        // 3. Audio Player Logic
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                synth.cancel();
                isPlaying = false;
                isPaused = true;
                playerStatus.innerText = "Paused";
                updatePlayButtonUI();
            } else {
                isPlaying = true;
                isPaused = false;
                playerStatus.innerText = "Reading...";
                updatePlayButtonUI();
                speakCurrentChunk();
            }
        });

        stopBtn.addEventListener('click', () => {
            synth.cancel();
            isPlaying = false;
            isPaused = false;
            currentChunkIndex = 0; 
            playerStatus.innerText = "Stopped. Press Play to start from beginning.";
            updatePlayButtonUI();
        });

        backBtn.addEventListener('click', () => {
            synth.cancel();
            isPlaying = false;
            playerScreen.classList.add('hidden');
            playerScreen.classList.remove('flex');
            setupScreen.classList.remove('hidden');
            setupStatus.innerText = "";
        });

        function speakCurrentChunk() {
            if (!isPlaying) return; 
            if (currentChunkIndex >= storyChunks.length) {
                isPlaying = false;
                playerStatus.innerText = "Story Complete. Sweet dreams.";
                updatePlayButtonUI();
                return;
            }

            const textToSpeak = storyChunks[currentChunkIndex].trim();
            if (!textToSpeak || textToSpeak.length <= 1) {
                currentChunkIndex++;
                speakCurrentChunk();
                return;
            }

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            
            // USE THE USER'S SELECTED VOICE
            const savedVoiceURI = localStorage.getItem('gemini_selected_voice');
            let selectedVoice = null;
            
            if (savedVoiceURI && voices.length > 0) {
                selectedVoice = voices.find(v => v.voiceURI === savedVoiceURI);
            }
            
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }

            utterance.rate = 0.75; 
            utterance.pitch = 0.9;
            utterance.volume = 1.0;

            utterance.onend = () => {
                if (isPlaying) {
                    currentChunkIndex++;
                    speakCurrentChunk();
                }
            };

            utterance.onerror = (e) => {
                if (e.error === 'interrupted' || e.error === 'canceled') return;
                console.error("Audio error:", e);
                if (isPlaying) {
                    currentChunkIndex++;
                    speakCurrentChunk();
                }
            };

            synth.speak(utterance);
        }

        function updatePlayButtonUI() {
            if (isPlaying) {
                playIcon.classList.remove('ph-play');
                playIcon.classList.add('ph-pause');
            } else {
                playIcon.classList.remove('ph-pause');
                playIcon.classList.add('ph-play');
            }
        }

        // 4. API Calls
        async function getValidModel(apiKey) {
            let cachedModel = localStorage.getItem('gemini_preferred_model');
            if (cachedModel && cachedModel.includes('latest')) {
                localStorage.removeItem('gemini_preferred_model');
                cachedModel = null;
            }
            if (cachedModel) return cachedModel;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            if (!response.ok) throw new Error("Invalid API Key");
            
            const data = await response.json();
            const validModels = data.models.filter(m => 
                m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent')
            );

            if (validModels.length === 0) throw new Error("No text models found.");
            
            const preferredModel = validModels.find(m => m.name.includes('gemini-2.5-flash')) || 
                                   validModels.find(m => m.name.includes('gemini-1.5-flash')) || 
                                   validModels[0];
            
            localStorage.setItem('gemini_preferred_model', preferredModel.name);
            return preferredModel.name;
        }

        async function fetchStoryFromAPI(apiKey, modelName, category) {
            const prompt = `Write a highly descriptive, incredibly slow-paced, and soothing bedtime story for an adult. 
            The category/theme is: ${category}. 
            The goal is for the user to fall asleep while listening. Focus heavily on sensory details, gentle sounds, soft lighting, and a calm, meandering narrative arc with no high stakes or stressful conflict. 
            Make the story extremely long, aiming for at least 5,000 words, maximizing your output length. Use calm, rhythmic sentence structures. Output only the story text. Do not use Markdown formatting like bold or italics.`;

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${apiKey}`;

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { maxOutputTokens: 8192, temperature: 0.7 }
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "Failed to generate story.");
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }
        
        window.addEventListener('beforeunload', () => {
            synth.cancel();
        });
    </script>
</body>
</html>
