<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nightfall | Bedtime Stories</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#060913">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Premium Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Lora"', 'serif'],
                    },
                    colors: {
                        night: {
                            900: '#060913',
                            800: '#0A1128',
                            700: '#141E3A',
                            600: '#1E2C5A',
                        },
                        starlight: '#E2E8F0',
                        accent: '#8B9FEA',
                        'accent-hover': '#6B82D6',
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(-45deg, #060913, #0A1128, #0b1120, #060913);
            background-size: 400% 400%;
            color: theme('colors.starlight');
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .glass {
            background: rgba(20, 30, 58, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-pill {
            background: rgba(20, 30, 58, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        .story-text { font-size: 1.25rem; line-height: 1.85; color: #D1D5DB; }
        .story-text p { margin-bottom: 1.5em; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(139, 159, 234, 0.3); border-radius: 10px; }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%238B9FEA' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em;
        }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: theme('colors.accent'); cursor: pointer; margin-top: -8px; box-shadow: 0 0 10px rgba(139, 159, 234, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 2px; }

        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { transform: scale(0.95) translateY(10px); opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }
    </style>
</head>

        <!-- Player Screen -->

            <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass-pill rounded-full p-2 flex items-center justify-between z-20 px-4">
                <button id="backBtn" class="p-3 text-slate-400 hover:text-white transition-colors flex flex-col items-center group">

    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-night-900/80 backdrop-blur-sm z-50 flex justify-center items-center p-4 modal-overlay">
        <div class="modal-content bg-night-800 w-full max-w-md rounded-3xl p-6 sm:p-8 shadow-2xl border border-white/10 max-h-[90vh] overflow-y-auto flex flex-col relative">
            <button id="closeSettingsBtn" class="absolute top-6 right-6 text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 p-2 rounded-full transition-colors">

            </button>
            <h2 class="text-2xl font-serif text-white mb-8">Settings</h2>
            
            <div class="flex flex-col gap-8">
                <!-- Ambient Sound Section -->
                <div class="bg-night-900/50 p-4 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="ph-fill ph-waves text-accent text-lg"></i>
                        <h3 class="text-sm font-medium text-slate-200">Ambient Background</h3>
                    </div>
                    <select id="ambientSelect" class="w-full bg-night-800 border border-white/10 text-white rounded-xl p-3 appearance-none focus:outline-none focus:border-accent transition-colors mb-4 text-sm">
                        <option value="none">None</option>
                        <option value="brown">Deep River (Brown Noise)</option>
                        <option value="rain">Gentle Rain (Filtered Noise)</option>
                        <option value="waves">Ocean Waves</option>
                        <option value="fire">Campfire Crackle</option>
                    </select>
                    <div class="flex items-center gap-3">
                        <i class="ph-fill ph-speaker-low text-slate-400"></i>
                        <input type="range" id="ambientVol" min="1" max="100" value="20">

                    </div>
                </div>

                <!-- Reader Voice Section -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Narrator Voice</label>
                    <select id="voiceSelect" class="w-full bg-night-900 border border-white/10 text-white rounded-xl p-4 appearance-none focus:outline-none focus:border-accent transition-colors">
                        <optgroup label="Gemini Cloud Voices (High Quality)">
                            <option value="gemini-Kore">Kore (Soft Female)</option>
                            <option value="gemini-Aoede">Aoede (Calm Female)</option>
                            <option value="gemini-Leda">Leda (Gentle Female)</option>
                            <option value="gemini-Charon">Charon (Deep Male)</option>
                            <option value="gemini-Fenrir">Fenrir (Warm Male)</option>
                        </optgroup>
                        <optgroup label="Local Device Voices" id="localVoicesGroup">
                            <option value="">Loading voices...</option>
                        </optgroup>
                    </select>
                    <button id="testVoiceBtn" class="mt-3 w-full py-3 rounded-xl text-sm font-medium border border-white/10 text-white hover:bg-white/5 transition-colors flex justify-center items-center gap-2">
                        <i class="ph-fill ph-waveform"></i> Test Mix (Voice + Ambient)
                    </button>
                </div>

                <!-- API Key Section -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Gemini API Key</label>
                    <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-night-900 border border-white/10 text-white rounded-xl p-4 focus:outline-none focus:border-accent transition-colors">
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const setupScreen = document.getElementById('setupScreen');
        const playerScreen = document.getElementById('playerScreen');
        const settingsModal = document.getElementById('settingsModal');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const apiKeyInput = document.getElementById('apiKey');
        const voiceSelect = document.getElementById('voiceSelect');
        const ambientSelect = document.getElementById('ambientSelect');
        const ambientVolInput = document.getElementById('ambientVol');
        const testVoiceBtn = document.getElementById('testVoiceBtn');
        const generateBtn = document.getElementById('generateBtn');
        const setupStatus = document.getElementById('setupStatus');
        const categorySelect = document.getElementById('category');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const stopBtn = document.getElementById('stopBtn');
        const backBtn = document.getElementById('backBtn');
        const playerStatus = document.getElementById('playerStatus');
        const storyOutput = document.getElementById('storyOutput');

        // State Variables
        const synth = window.speechSynthesis;
        let voices = [];
        let storyChunks = [];
        let currentChunkIndex = 0;
        let isPlaying = false;
        let isPaused = false; 
        let geminiAudioSource = null; 
        
        // CONCURRENCY LOCK: Prevents multiple API audio fetches from overlapping 
        let currentPlaybackId = 0; 

        // --- FETCH UTILITY WITH EXPONENTIAL BACKOFF ---
        // Solves the "Model Busy / Overloaded" issue gracefully
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    
                    // Do not retry on Bad Request (400) or Unauthorized (403/API Key Error)
                    if (!response.ok && response.status !== 503 && response.status !== 429 && response.status !== 500) {
                         const err = await response.json().catch(()=>({}));
                         throw new Error(err.error?.message || `HTTP Error ${response.status}`);
                    }
                    
                    if (!response.ok) {
                        throw new Error(`Model overloaded (HTTP ${response.status})`);
                    }
                    
                    return response; // Success!
                } catch (err) {
                    if (i === maxRetries - 1 || err.message.includes("API key not valid")) {
                        throw err; // Out of retries or fatal error
                    }
                    console.warn(`Fetch failed (${err.message}). Retrying in ${delay}ms...`);
                    // Update UI if we are in the middle of fetching TTS audio
                    if (playerStatus.innerText.includes("Generating")) {
                        playerStatus.innerText = "Network busy. Retrying softly...";
                    } else if (setupStatus.innerText.includes("Writing")) {
                        setupStatus.innerText = "Gemini is busy. Retrying automatically...";
                    }
                    
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2; // Double the wait time: 1s, 2s, 4s, 8s, 16s
                }
            }
        }

        // --- WEB AUDIO API: Ambient Synthesizer ---
        let audioCtx = null;
        let masterGainNode = null;
        let ambientNodes = []; 

        function initAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function getNoiseBuffer(type) {
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            if (type === 'white') {
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            } else if (type === 'brown') {
                let lastOut = 0;
                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    data[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = data[i];
                    data[i] *= 3.5; 
                }
            }
            return buffer;
        }

        function playAmbientSound(type, volume) {
            if (type === 'none') return stopAmbientSound();
            initAudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stopAmbientSound(); 

            masterGainNode = audioCtx.createGain();
            masterGainNode.gain.value = volume / 100;
            masterGainNode.connect(audioCtx.destination);

            if (type === 'brown' || type === 'rain') {
                let noise = audioCtx.createBufferSource();
                noise.buffer = getNoiseBuffer(type === 'brown' ? 'brown' : 'white');
                noise.loop = true;
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = type === 'brown' ? 400 : 1200;
                let localGain = audioCtx.createGain();
                localGain.gain.value = 0.3; 
                noise.connect(filter); filter.connect(localGain); localGain.connect(masterGainNode);
                noise.start(); ambientNodes.push(noise);
            } else if (type === 'waves') {
                let noise = audioCtx.createBufferSource();
                noise.buffer = getNoiseBuffer('brown');
                noise.loop = true;
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 800; 
                let waveGain = audioCtx.createGain(); waveGain.gain.value = 0.15; 
                let lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.08; 
                let lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.15; 
                lfo.connect(lfoGain); lfoGain.connect(waveGain.gain);
                noise.connect(filter); filter.connect(waveGain); waveGain.connect(masterGainNode);
                noise.start(); lfo.start(); ambientNodes.push(noise, lfo);
            } else if (type === 'fire') {
                let rumble = audioCtx.createBufferSource(); rumble.buffer = getNoiseBuffer('brown'); rumble.loop = true;
                let rumbleFilter = audioCtx.createBiquadFilter(); rumbleFilter.type = 'lowpass'; rumbleFilter.frequency.value = 150;
                let rumbleGain = audioCtx.createGain(); rumbleGain.gain.value = 0.4;
                rumble.connect(rumbleFilter); rumbleFilter.connect(rumbleGain); rumbleGain.connect(masterGainNode);
                
                const crackleBufSize = audioCtx.sampleRate * 5;
                const crackleBuf = audioCtx.createBuffer(1, crackleBufSize, audioCtx.sampleRate);
                const cData = crackleBuf.getChannelData(0);
                for (let i = 0; i < crackleBufSize; i++) {
                    if (Math.random() < 0.003) { 
                        let burst = Math.random() * 2 - 1; let duration = Math.floor(Math.random() * 80) + 10; 
                        for(let j=0; j<duration && i+j < crackleBufSize; j++) { cData[i+j] = burst * (1 - j/duration); }
                        i += duration; 
                    }
                }
                let crackle = audioCtx.createBufferSource(); crackle.buffer = crackleBuf; crackle.loop = true;
                let crackleFilter = audioCtx.createBiquadFilter(); crackleFilter.type = 'highpass'; crackleFilter.frequency.value = 3500; 
                let crackleGain = audioCtx.createGain(); crackleGain.gain.value = 0.7;
                crackle.connect(crackleFilter); crackleFilter.connect(crackleGain); crackleGain.connect(masterGainNode);
                rumble.start(); crackle.start(); ambientNodes.push(rumble, crackle);
            }
        }

        function stopAmbientSound() {
            ambientNodes.forEach(node => { try { node.stop(); node.disconnect(); } catch(e) {} });
            ambientNodes = [];
            if (masterGainNode) { try { masterGainNode.disconnect(); } catch(e) {} masterGainNode = null; }
        }
        function pauseAmbientSound() { if (audioCtx && audioCtx.state === 'running') audioCtx.suspend(); }
        function resumeAmbientSound() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }
        function updateAmbientVolume(vol) { if (masterGainNode && audioCtx) masterGainNode.gain.setTargetAtTime(vol / 100, audioCtx.currentTime, 0.1); }

        // --- Voices & Settings Management ---
        function populateVoiceList() {
            voices = synth.getVoices();
            if (voices.length === 0) return;
            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            const localVoicesGroup = document.getElementById('localVoicesGroup');
            if (localVoicesGroup) localVoicesGroup.innerHTML = '';
            
            englishVoices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} ${voice.localService ? '(Local)' : '(Network)'}`;
                option.value = voice.voiceURI;
                if (localVoicesGroup) localVoicesGroup.appendChild(option);
            });

            const savedVoiceURI = localStorage.getItem('gemini_selected_voice');
            if (savedVoiceURI && (savedVoiceURI.startsWith('gemini-') || englishVoices.find(v => v.voiceURI === savedVoiceURI))) {
                voiceSelect.value = savedVoiceURI;
            } else {
                voiceSelect.value = "gemini-Kore"; localStorage.setItem('gemini_selected_voice', "gemini-Kore");
            }
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

        voiceSelect.addEventListener('change', (e) => localStorage.setItem('gemini_selected_voice', e.target.value));
        ambientSelect.addEventListener('change', (e) => {
            localStorage.setItem('gemini_ambient_type', e.target.value);
            playAmbientSound(e.target.value, ambientVolInput.value);
        });
        ambientVolInput.addEventListener('input', (e) => {
            localStorage.setItem('gemini_ambient_vol', e.target.value);
            updateAmbientVolume(e.target.value);
        });

        testVoiceBtn.addEventListener('click', async () => {
            if (ambientSelect.value !== 'none') playAmbientSound(ambientSelect.value, ambientVolInput.value);
            
            const selectedURI = voiceSelect.value;
            const testText = "This is how I will read your story tonight. The background noise will play beneath my voice. Close your eyes, and relax.";

            if (selectedURI.startsWith('gemini-')) {
                const apiKey = apiKeyInput.value.trim();
                if(!apiKey) { alert("Please enter an API key to test Gemini Cloud voices."); return; }
                
                testVoiceBtn.disabled = true;
                testVoiceBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin"></i> Loading...';
                
                try {
                    const voiceName = selectedURI.replace('gemini-', '');
                    const audioData = await fetchGeminiTTS(testText, voiceName, apiKey);
                    const sampleRate = parseInt(audioData.mimeType.match(/rate=(\d+)/)?.[1] || "24000", 10);
                    if (geminiAudioSource) try { geminiAudioSource.stop(); } catch(e){}
                    geminiAudioSource = await playPCM16(audioData.data, sampleRate);
                } catch(err) {
                    alert("Error: " + err.message);
                }
                
                testVoiceBtn.disabled = false;
                testVoiceBtn.innerHTML = '<i class="ph-fill ph-waveform"></i> Test Mix (Voice + Ambient)';
            } else {
                synth.cancel();
                const utterance = new SpeechSynthesisUtterance(testText);
                utterance.voice = voices.find(v => v.voiceURI === selectedURI);
                utterance.rate = 0.85; utterance.pitch = 0.9;
                synth.speak(utterance);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key'); if (savedKey) apiKeyInput.value = savedKey;
            const savedAmbient = localStorage.getItem('gemini_ambient_type'); if (savedAmbient) ambientSelect.value = savedAmbient;
            const savedVol = localStorage.getItem('gemini_ambient_vol'); if (savedVol) ambientVolInput.value = savedVol;
        });

        apiKeyInput.addEventListener('change', (e) => localStorage.setItem('gemini_api_key', e.target.value.trim()));

        openSettingsBtn.addEventListener('click', () => { settingsModal.classList.add('active'); populateVoiceList(); });
        closeSettingsBtn.addEventListener('click', () => {
            synth.cancel(); if (!isPlaying) stopAmbientSound();
            settingsModal.classList.remove('active');
            if (apiKeyInput.value.trim()) localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
        });
        settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) closeSettingsBtn.click(); });

        // --- Generation Logic ---
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { openSettingsBtn.click(); setTimeout(() => alert("Please enter your Gemini API Key to begin."), 300); return; }

            try {
                generateBtn.disabled = true;
                generateBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Crafting...';
                setupStatus.innerText = "Connecting to Gemini...";

                const modelName = await getValidModel(apiKey);
                
                setupStatus.innerText = "Writing your story... (This may take a minute)";
                const storyText = await fetchStoryFromAPI(apiKey, modelName, categorySelect.value);
                
                const formattedText = storyText.split('\n\n').filter(p => p.trim() !== '').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
                storyOutput.innerHTML = formattedText;
                
                let spokenText = storyText.replace(/\*/g, '');
                let rawSentences = spokenText.replace(/[\r\n]+/g, ' ').split(/(?<=[.!?])\s+(?=[A-Z"'])/);
                rawSentences = rawSentences.filter(chunk => chunk.trim().length > 0);
                
                // SMART CHUNKING: Group sentences into ~600 character blocks to prevent Free Tier Rate Limit crashes.
                storyChunks = [];
                let tempChunk = "";
                for (let sentence of rawSentences) {
                    if (tempChunk.length + sentence.length < 600) {
                        tempChunk += (tempChunk.length > 0 ? " " : "") + sentence;
                    } else {
                        if (tempChunk) storyChunks.push(tempChunk);
                        tempChunk = sentence;
                    }
                }
                if (tempChunk) storyChunks.push(tempChunk);
                
                currentChunkIndex = 0;
                setupScreen.classList.add('hidden'); playerScreen.classList.remove('hidden'); playerScreen.classList.add('flex');
                window.scrollTo(0, 0); 
                
                isPlaying = false; isPaused = false;
                updatePlayButtonUI();
                playerStatus.innerText = "Ready to play"; playerStatus.classList.remove('text-red-400'); playerStatus.classList.add('text-accent');

            } catch (error) {
                setupStatus.innerText = error.message;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="ph-fill ph-book-open-text text-xl"></i> Write My Story';
            }
        });

        // --- Audio Player Logic with Concurrency Locks ---
        playPauseBtn.addEventListener('click', () => {
            currentPlaybackId++; // Generate new lock ID on every play/pause action

            if (isPlaying) {
                synth.cancel();
                if (geminiAudioSource) { try { geminiAudioSource.stop(); } catch(e){} geminiAudioSource = null; }
                pauseAmbientSound();
                isPlaying = false; isPaused = true;
                playerStatus.innerText = "Paused";
                updatePlayButtonUI();
            } else {
                isPlaying = true; isPaused = false;
                playerStatus.innerText = "Reading softly...";
                updatePlayButtonUI();
                
                speakCurrentChunk(currentPlaybackId); // Pass lock ID down the chain
                
                const type = ambientSelect.value;
                if (type !== 'none') {
                    if (audioCtx && audioCtx.state === 'suspended' && ambientNodes.length > 0) resumeAmbientSound();
                    else if (ambientNodes.length === 0) playAmbientSound(type, ambientVolInput.value);
                }
            }
        });

        stopBtn.addEventListener('click', () => {
            currentPlaybackId++; // Break locks
            synth.cancel();
            if (geminiAudioSource) { try { geminiAudioSource.stop(); } catch(e){} geminiAudioSource = null; }
            stopAmbientSound();
            isPlaying = false; isPaused = false; currentChunkIndex = 0; 
            playerStatus.innerText = "Stopped";
            updatePlayButtonUI();
        });

        backBtn.addEventListener('click', () => {
            currentPlaybackId++; // Break locks
            synth.cancel();
            if (geminiAudioSource) { try { geminiAudioSource.stop(); } catch(e){} geminiAudioSource = null; }
            stopAmbientSound();
            isPlaying = false;
            playerScreen.classList.add('hidden'); playerScreen.classList.remove('flex'); setupScreen.classList.remove('hidden');
            setupStatus.innerText = "";
        });

        async function speakCurrentChunk(playbackId) {
            // Verify lock: abort if user pressed pause/stop/play while we were entering function
            if (!isPlaying || playbackId !== currentPlaybackId) return; 

            if (currentChunkIndex >= storyChunks.length) {
                isPlaying = false;
                stopAmbientSound(); 
                playerStatus.innerText = "Story complete. Sweet dreams.";
                updatePlayButtonUI();
                return;
            }

            const textToSpeak = storyChunks[currentChunkIndex].trim();
            if (!textToSpeak || textToSpeak.length <= 1) {
                currentChunkIndex++;
                return speakCurrentChunk(playbackId);
            }

            const savedVoiceURI = localStorage.getItem('gemini_selected_voice');

            if (savedVoiceURI && savedVoiceURI.startsWith('gemini-')) {
                // CLOUD TTS
                try {
                    playerStatus.innerText = "Generating voice...";
                    const apiKey = apiKeyInput.value.trim();
                    const voiceName = savedVoiceURI.replace('gemini-', '');
                    
                    // Uses exponential backoff to survive "Model Busy" responses automatically
                    const audioData = await fetchGeminiTTS(textToSpeak, voiceName, apiKey);
                    
                    // STRICT VERIFICATION: Verify lock again. The fetch took time. Did the user touch the controls?
                    if (!isPlaying || playbackId !== currentPlaybackId) return; 
                    
                    playerStatus.innerText = "Reading softly...";
                    const sampleRate = parseInt(audioData.mimeType.match(/rate=(\d+)/)?.[1] || "24000", 10);
                    geminiAudioSource = await playPCM16(audioData.data, sampleRate);
                    
                    geminiAudioSource.onended = () => {
                        geminiAudioSource = null;
                        // Verify lock one final time before chaining next chunk
                        if (isPlaying && playbackId === currentPlaybackId) {
                            currentChunkIndex++;
                            speakCurrentChunk(playbackId);
                        }
                    };
                } catch(err) {
                    console.error("Gemini TTS Error:", err);
                    playerStatus.innerText = "Audio error. Skipping sentence...";
                    if (isPlaying && playbackId === currentPlaybackId) {
                        currentChunkIndex++;
                        speakCurrentChunk(playbackId); 
                    }
                }
            } else {
                // LOCAL TTS
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                if (savedVoiceURI && voices.length > 0) {
                    const selectedVoice = voices.find(v => v.voiceURI === savedVoiceURI);
                    if (selectedVoice) utterance.voice = selectedVoice;
                }
                utterance.rate = 0.8; utterance.pitch = 0.9; utterance.volume = 1.0;

                utterance.onend = () => {
                    // Local TTS is synchronous, but we check lock for safety
                    if (isPlaying && playbackId === currentPlaybackId) {
                        currentChunkIndex++;
                        speakCurrentChunk(playbackId);
                    }
                };
                utterance.onerror = (e) => {
                    if (e.error === 'interrupted' || e.error === 'canceled') return;
                    if (isPlaying && playbackId === currentPlaybackId) {
                        currentChunkIndex++; speakCurrentChunk(playbackId);
                    }
                };
                synth.speak(utterance);
            }
        }

        function updatePlayButtonUI() {
            if (isPlaying) {
                playIcon.classList.remove('ph-play', 'ml-1'); playIcon.classList.add('ph-pause');
            } else {
                playIcon.classList.remove('ph-pause'); playIcon.classList.add('ph-play', 'ml-1');
            }
        }

        // --- API Calls utilizing the new Retry Engine ---
        async function getValidModel(apiKey) {
            let cachedModel = localStorage.getItem('gemini_preferred_model');
            if (cachedModel && cachedModel.includes('latest')) { localStorage.removeItem('gemini_preferred_model'); cachedModel = null; }
            if (cachedModel) return cachedModel;

            const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const data = await response.json();
            const validModels = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'));
            if (validModels.length === 0) throw new Error("No text models found on this key.");
            
            const preferredModel = validModels.find(m => m.name.includes('gemini-2.5-flash')) || validModels.find(m => m.name.includes('gemini-1.5-flash')) || validModels[0];
            localStorage.setItem('gemini_preferred_model', preferredModel.name);
            return preferredModel.name;
        }

        async function fetchStoryFromAPI(apiKey, modelName, category) {
            const prompt = `Write a highly descriptive, incredibly slow-paced, and soothing bedtime story for an adult. The category/theme is: ${category}. The goal is for the user to fall asleep while listening. Focus heavily on sensory details, gentle sounds, soft lighting, and a calm, meandering narrative arc with no high stakes or stressful conflict. Make the story extremely long, aiming for at least 5,000 words, maximizing your output length. Use calm, rhythmic sentence structures. Output only the story text. Do not use Markdown formatting like bold or italics. Format into natural, spaced paragraphs.`;
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 8192, temperature: 0.7 }
            };

            const response = await fetchWithRetry(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function fetchGeminiTTS(text, voiceName, apiKey) {
            const promptText = `Say this bedtime story line extremely softly, slowly, and in a calming whisper:\n\n${text}`;
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
                }
            };
            
            const response = await fetchWithRetry(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();
            return result.candidates[0].content.parts[0].inlineData;
        }

        async function playPCM16(base64Data, sampleRate) {
            initAudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const int16Array = new Int16Array(bytes.buffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 32768.0;
            
            const audioBuffer = audioCtx.createBuffer(1, float32Array.length, sampleRate);
            audioBuffer.getChannelData(0).set(float32Array);

            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            source.start();
            return source;
        }
        
        window.addEventListener('beforeunload', () => {
            synth.cancel();
            if (geminiAudioSource) { try { geminiAudioSource.stop(); } catch(e){} }
            stopAmbientSound();
        });

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(r => console.log('SW ok')).catch(e => console.log('SW fail', e));
            });
        }
    </script>
