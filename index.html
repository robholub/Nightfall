<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nightfall | Bedtime Stories</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#060913">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%238B9FEA'/><path d='M50 20 A30 30 0 1 0 80 50 A40 40 0 0 1 50 20 Z' fill='%23060913'/></svg>">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Premium Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Lora"', 'serif'],
                    },
                    colors: {
                        night: {
                            900: '#060913',
                            800: '#0A1128',
                            700: '#141E3A',
                            600: '#1E2C5A',
                        },
                        starlight: '#E2E8F0',
                        accent: '#8B9FEA',
                        'accent-hover': '#6B82D6',
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(-45deg, #060913, #0A1128, #0b1120, #060913);
            background-size: 400% 400%;
            color: theme('colors.starlight');
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .glass {
            background: rgba(20, 30, 58, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-pill {
            background: rgba(20, 30, 58, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        .story-text {
            font-size: 1.25rem;
            line-height: 1.85;
            color: #D1D5DB;
        }

        .story-text p {
            margin-bottom: 1.5em;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 159, 234, 0.3);
            border-radius: 10px;
        }

        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%238B9FEA' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: theme('colors.accent');
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(139, 159, 234, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* Modals */
        .modal-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            transform: scale(0.95) translateY(10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="animate-gradient-x min-h-screen flex flex-col items-center font-sans">

    <!-- Top Navigation -->
    <header class="w-full max-w-3xl flex justify-between items-center p-6 sm:p-8 z-10">
        <div class="flex items-center gap-3">
            <i class="ph-fill ph-moon-stars text-3xl text-accent"></i>
            <div>
                <h1 class="text-2xl font-semibold tracking-wide text-white">Nightfall</h1>
            </div>
        </div>
        <button id="openSettingsBtn" class="p-2 rounded-full hover:bg-white/5 transition-colors text-slate-400 hover:text-white">
            <i class="ph ph-sliders-horizontal text-2xl"></i>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="w-full max-w-3xl flex-1 flex flex-col relative px-6 sm:px-8 pb-32">
        
        <!-- Setup Screen -->
        <div id="setupScreen" class="flex-1 flex flex-col justify-center animate-slide-up max-w-lg mx-auto w-full">
            <div class="text-center mb-10">
                <h2 class="text-3xl sm:text-4xl font-serif text-white mb-4">Drift away.</h2>
                <p class="text-slate-400 text-lg font-light">Select a theme and let AI craft an endless, soothing journey just for you.</p>
            </div>

            <div class="glass p-8 rounded-3xl flex flex-col gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-3 ml-1">Tonight's Setting</label>
                    <select id="category" class="w-full bg-night-800/50 border border-white/10 text-white rounded-2xl p-4 appearance-none focus:outline-none focus:border-accent transition-colors text-lg">
                        <option value="A quiet journey through a bioluminescent forest">Bioluminescent Forest</option>
                        <option value="A peaceful deep-space observation post">Deep Space Observation</option>
                        <option value="A cozy cabin during a gentle snowstorm">Snowy Cabin Retreat</option>
                        <option value="A slow train ride through a magical countryside">Magical Train Ride</option>
                        <option value="A gentle boat ride down a lazy, moonlit river">Moonlit River Cruise</option>
                        <option value="A quiet library inside an ancient castle during a rainstorm">Rainy Castle Library</option>
                    </select>
                </div>
                
                <button id="generateBtn" class="w-full py-4 mt-2 rounded-2xl font-semibold text-lg bg-accent text-night-900 hover:bg-accent-hover hover:shadow-lg hover:shadow-accent/20 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                    <i class="ph-fill ph-book-open-text text-xl"></i> Write My Story
                </button>
                <p id="setupStatus" class="text-center text-sm text-accent h-6 mt-[-10px] animate-pulse"></p>
            </div>
        </div>

        <!-- Player Screen (Hidden initially) -->
        <div id="playerScreen" class="hidden flex-col h-full animate-fade-in relative pt-4">
            <!-- Reader Area -->
            <div id="storyOutput" class="story-text font-serif"></div>
            
            <!-- Floating Media Controls -->
            <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass-pill rounded-full p-2 flex items-center justify-between z-20 px-4">
                <button id="backBtn" class="p-3 text-slate-400 hover:text-white transition-colors flex flex-col items-center group">
                    <i class="ph ph-arrow-left text-xl group-hover:-translate-x-1 transition-transform"></i>
                </button>
                
                <div class="flex items-center gap-4">
                    <button id="stopBtn" class="p-3 text-slate-400 hover:text-red-400 transition-colors">
                        <i class="ph-fill ph-stop text-xl"></i>
                    </button>
                    <button id="playPauseBtn" class="h-14 w-14 flex items-center justify-center rounded-full bg-accent text-night-900 hover:bg-accent-hover transition-all hover:scale-105 shadow-[0_0_20px_rgba(139,159,234,0.3)]">
                        <i id="playIcon" class="ph-fill ph-play text-2xl ml-1"></i>
                    </button>
                </div>

                <div class="w-10 flex justify-center">
                    <i class="ph-fill ph-speaker-high text-slate-400 text-lg"></i>
                </div>
            </div>
            
            <!-- Floating Status -->
            <div class="fixed bottom-28 left-0 right-0 text-center pointer-events-none z-10">
                <span id="playerStatus" class="inline-block px-4 py-1 rounded-full bg-night-900/80 backdrop-blur-md text-xs font-medium tracking-wide text-accent border border-white/5 shadow-xl">Story Ready</span>
            </div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-night-900/80 backdrop-blur-sm z-50 flex justify-center items-center p-4 modal-overlay">
        <div class="modal-content bg-night-800 w-full max-w-md rounded-3xl p-6 sm:p-8 shadow-2xl border border-white/10 max-h-[90vh] overflow-y-auto flex flex-col relative">
            
            <button id="closeSettingsBtn" class="absolute top-6 right-6 text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 p-2 rounded-full transition-colors">
                <i class="ph ph-x text-lg"></i>
            </button>
            
            <h2 class="text-2xl font-serif text-white mb-8">Settings</h2>
            
            <div class="flex flex-col gap-8">
                
                <!-- Ambient Sound Section -->
                <div class="bg-night-900/50 p-4 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="ph-fill ph-waves text-accent text-lg"></i>
                        <h3 class="text-sm font-medium text-slate-200">Ambient Background</h3>
                    </div>
                    <select id="ambientSelect" class="w-full bg-night-800 border border-white/10 text-white rounded-xl p-3 appearance-none focus:outline-none focus:border-accent transition-colors mb-4 text-sm">
                        <option value="none">None</option>
                        <option value="brown">Deep River (Brown Noise)</option>
                        <option value="rain">Gentle Rain (Filtered Noise)</option>
                        <option value="waves">Ocean Waves</option>
                        <option value="fire">Campfire Crackle</option>
                    </select>
                    
                    <div class="flex items-center gap-3">
                        <i class="ph-fill ph-speaker-low text-slate-400"></i>
                        <input type="range" id="ambientVol" min="1" max="100" value="20">
                        <i class="ph-fill ph-speaker-high text-slate-400"></i>
                    </div>
                </div>

                <!-- Reader Voice Section -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Narrator Voice</label>
                    <select id="voiceSelect" class="w-full bg-night-900 border border-white/10 text-white rounded-xl p-4 appearance-none focus:outline-none focus:border-accent transition-colors">
                        <option value="">Loading voices...</option>
                    </select>
                    <button id="testVoiceBtn" class="mt-3 w-full py-3 rounded-xl text-sm font-medium border border-white/10 text-white hover:bg-white/5 transition-colors flex justify-center items-center gap-2">
                        <i class="ph-fill ph-waveform"></i> Test Mix (Voice + Ambient)
                    </button>
                </div>

                <!-- API Key Section -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Gemini API Key</label>
                    <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-night-900 border border-white/10 text-white rounded-xl p-4 focus:outline-none focus:border-accent transition-colors">
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const setupScreen = document.getElementById('setupScreen');
        const playerScreen = document.getElementById('playerScreen');
        const settingsModal = document.getElementById('settingsModal');
        
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        
        const apiKeyInput = document.getElementById('apiKey');
        const voiceSelect = document.getElementById('voiceSelect');
        const ambientSelect = document.getElementById('ambientSelect');
        const ambientVolInput = document.getElementById('ambientVol');
        const testVoiceBtn = document.getElementById('testVoiceBtn');
        
        const generateBtn = document.getElementById('generateBtn');
        const setupStatus = document.getElementById('setupStatus');
        const categorySelect = document.getElementById('category');
        
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const stopBtn = document.getElementById('stopBtn');
        const backBtn = document.getElementById('backBtn');
        const playerStatus = document.getElementById('playerStatus');
        const storyOutput = document.getElementById('storyOutput');

        // State Variables
        const synth = window.speechSynthesis;
        let voices = [];
        let storyChunks = [];
        let currentChunkIndex = 0;
        let isPlaying = false;
        let isPaused = false; 

        // --- WEB AUDIO API: Ambient Synthesizer ---
        let audioCtx = null;
        let masterGainNode = null;
        let ambientNodes = []; 

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Helper function to create raw noise buffers
        function getNoiseBuffer(type) {
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);

            if (type === 'white') {
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            } else if (type === 'brown') {
                let lastOut = 0;
                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    data[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = data[i];
                    data[i] *= 3.5; 
                }
            }
            return buffer;
        }

        function playAmbientSound(type, volume) {
            if (type === 'none') {
                stopAmbientSound();
                return;
            }

            initAudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stopAmbientSound(); 

            // Create a master volume control for the ambient layer
            masterGainNode = audioCtx.createGain();
            masterGainNode.gain.value = volume / 100;
            masterGainNode.connect(audioCtx.destination);

            if (type === 'brown' || type === 'rain') {
                // STANDARD CONTINUOUS NOISE (River or Rain)
                let noise = audioCtx.createBufferSource();
                noise.buffer = getNoiseBuffer(type === 'brown' ? 'brown' : 'white');
                noise.loop = true;

                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = type === 'brown' ? 400 : 1200;

                let localGain = audioCtx.createGain();
                localGain.gain.value = 0.3; // Base scale for these sounds

                noise.connect(filter);
                filter.connect(localGain);
                localGain.connect(masterGainNode);
                
                noise.start();
                ambientNodes.push(noise);

            } else if (type === 'waves') {
                // OCEAN WAVES (Brown noise modulated by a slow Sine Wave LFO)
                let noise = audioCtx.createBufferSource();
                noise.buffer = getNoiseBuffer('brown');
                noise.loop = true;

                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 800; 

                // This gain node's value will be pushed up and down by the LFO
                let waveGain = audioCtx.createGain();
                waveGain.gain.value = 0.15; 

                // Low Frequency Oscillator (LFO)
                let lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.08; // One wave every ~12.5 seconds

                let lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 0.15; // Amount of volume swing

                lfo.connect(lfoGain);
                lfoGain.connect(waveGain.gain);

                noise.connect(filter);
                filter.connect(waveGain);
                waveGain.connect(masterGainNode);

                noise.start();
                lfo.start();
                ambientNodes.push(noise, lfo);

            } else if (type === 'fire') {
                // CAMPFIRE (Low rumble mixed with random high-pass wood pops)
                
                // Part 1: The Rumble
                let rumble = audioCtx.createBufferSource();
                rumble.buffer = getNoiseBuffer('brown');
                rumble.loop = true;
                
                let rumbleFilter = audioCtx.createBiquadFilter();
                rumbleFilter.type = 'lowpass';
                rumbleFilter.frequency.value = 150;
                
                let rumbleGain = audioCtx.createGain();
                rumbleGain.gain.value = 0.4;
                
                rumble.connect(rumbleFilter);
                rumbleFilter.connect(rumbleGain);
                rumbleGain.connect(masterGainNode);
                
                // Part 2: The Crackle (Create a 5 second buffer of random pops)
                const crackleBufSize = audioCtx.sampleRate * 5;
                const crackleBuf = audioCtx.createBuffer(1, crackleBufSize, audioCtx.sampleRate);
                const cData = crackleBuf.getChannelData(0);
                
                for (let i = 0; i < crackleBufSize; i++) {
                    if (Math.random() < 0.003) { // 0.3% chance of a wood pop
                        let burst = Math.random() * 2 - 1; // Loudness of pop
                        let duration = Math.floor(Math.random() * 80) + 10; // Pop length
                        for(let j=0; j<duration && i+j < crackleBufSize; j++) {
                            cData[i+j] = burst * (1 - j/duration); // Fade out pop instantly
                        }
                        i += duration; // Fast forward past the pop
                    }
                }
                
                let crackle = audioCtx.createBufferSource();
                crackle.buffer = crackleBuf;
                crackle.loop = true;

                let crackleFilter = audioCtx.createBiquadFilter();
                crackleFilter.type = 'highpass';
                crackleFilter.frequency.value = 3500; // Only let sharp clicks through

                let crackleGain = audioCtx.createGain();
                crackleGain.gain.value = 0.7;

                crackle.connect(crackleFilter);
                crackleFilter.connect(crackleGain);
                crackleGain.connect(masterGainNode);

                rumble.start();
                crackle.start();
                ambientNodes.push(rumble, crackle);
            }
        }

        function stopAmbientSound() {
            ambientNodes.forEach(node => {
                try { node.stop(); node.disconnect(); } catch(e) {}
            });
            ambientNodes = [];
            if (masterGainNode) {
                try { masterGainNode.disconnect(); } catch(e) {}
                masterGainNode = null;
            }
        }

        function pauseAmbientSound() {
            if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
        }

        function resumeAmbientSound() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function updateAmbientVolume(vol) {
            if (masterGainNode && audioCtx) {
                masterGainNode.gain.setTargetAtTime(vol / 100, audioCtx.currentTime, 0.1);
            }
        }

        // --- Voices & Settings Management ---
        function populateVoiceList() {
            voices = synth.getVoices();
            if (voices.length === 0) return;

            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            voiceSelect.innerHTML = '';
            
            englishVoices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} ${voice.localService ? '(Local)' : '(Network)'}`;
                option.value = voice.voiceURI;
                voiceSelect.appendChild(option);
            });

            const savedVoiceURI = localStorage.getItem('gemini_selected_voice');
            if (savedVoiceURI && englishVoices.find(v => v.voiceURI === savedVoiceURI)) {
                voiceSelect.value = savedVoiceURI;
            } else {
                const defaultVoice = englishVoices.find(v => 
                    v.name.includes('Google UK English Female') || 
                    (v.name.includes('Google') && !v.localService)
                ) || englishVoices[0];
                if (defaultVoice) {
                    voiceSelect.value = defaultVoice.voiceURI;
                    localStorage.setItem('gemini_selected_voice', defaultVoice.voiceURI);
                }
            }
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

        voiceSelect.addEventListener('change', (e) => localStorage.setItem('gemini_selected_voice', e.target.value));
        
        ambientSelect.addEventListener('change', (e) => {
            localStorage.setItem('gemini_ambient_type', e.target.value);
            playAmbientSound(e.target.value, ambientVolInput.value);
        });

        ambientVolInput.addEventListener('input', (e) => {
            localStorage.setItem('gemini_ambient_vol', e.target.value);
            updateAmbientVolume(e.target.value);
        });

        testVoiceBtn.addEventListener('click', () => {
            if (ambientSelect.value !== 'none') {
                playAmbientSound(ambientSelect.value, ambientVolInput.value);
            }
            
            const selectedURI = voiceSelect.value;
            const voice = voices.find(v => v.voiceURI === selectedURI);
            if (voice) {
                synth.cancel();
                const utterance = new SpeechSynthesisUtterance("This is how I will read your story tonight. The background noise will play beneath my voice.");
                utterance.voice = voice;
                utterance.rate = 0.85; 
                utterance.pitch = 0.9;
                synth.speak(utterance);
            }
        });

        // --- App Initialization & Load Saves ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) apiKeyInput.value = savedKey;

            const savedAmbient = localStorage.getItem('gemini_ambient_type');
            if (savedAmbient) ambientSelect.value = savedAmbient;

            const savedVol = localStorage.getItem('gemini_ambient_vol');
            if (savedVol) ambientVolInput.value = savedVol;
        });

        apiKeyInput.addEventListener('change', (e) => localStorage.setItem('gemini_api_key', e.target.value.trim()));

        openSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('active');
            populateVoiceList();
        });

        closeSettingsBtn.addEventListener('click', () => {
            synth.cancel(); 
            if (!isPlaying) stopAmbientSound();
            
            settingsModal.classList.remove('active');
            if (apiKeyInput.value.trim()) {
                localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
            }
        });
        
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettingsBtn.click();
        });

        // --- Generation Logic ---
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                openSettingsBtn.click();
                setTimeout(() => alert("Please enter your Gemini API Key to begin."), 300);
                return;
            }

            try {
                generateBtn.disabled = true;
                generateBtn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Crafting...';
                setupStatus.innerText = "Connecting to Gemini...";

                const modelName = await getValidModel(apiKey);
                
                setupStatus.innerText = "Writing your story... (This may take a minute)";
                const storyText = await fetchStoryFromAPI(apiKey, modelName, categorySelect.value);
                
                const formattedText = storyText.split('\n\n').filter(p => p.trim() !== '').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
                storyOutput.innerHTML = formattedText;
                
                let spokenText = storyText.replace(/\*/g, '').replace(/[\r\n]+/g, ' ');
                storyChunks = spokenText.split(/(?<=[.!?])\s+(?=[A-Z"'])/);
                storyChunks = storyChunks.filter(chunk => chunk.trim().length > 0);
                currentChunkIndex = 0;
                
                setupScreen.classList.add('hidden');
                playerScreen.classList.remove('hidden');
                playerScreen.classList.add('flex');
                window.scrollTo(0, 0); 
                
                isPlaying = false;
                isPaused = false;
                updatePlayButtonUI();
                playerStatus.innerText = "Ready to play";
                playerStatus.classList.remove('text-red-400');
                playerStatus.classList.add('text-accent');

            } catch (error) {
                setupStatus.innerText = error.message;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="ph-fill ph-book-open-text text-xl"></i> Write My Story';
            }
        });

        // --- Audio Player Logic ---
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                synth.cancel();
                pauseAmbientSound();
                isPlaying = false;
                isPaused = true;
                playerStatus.innerText = "Paused";
                updatePlayButtonUI();
            } else {
                isPlaying = true;
                isPaused = false;
                playerStatus.innerText = "Reading softly...";
                updatePlayButtonUI();
                speakCurrentChunk();
                
                const type = ambientSelect.value;
                if (type !== 'none') {
                    if (audioCtx && audioCtx.state === 'suspended' && ambientNodes.length > 0) {
                        resumeAmbientSound();
                    } else if (ambientNodes.length === 0) {
                        playAmbientSound(type, ambientVolInput.value);
                    }
                }
            }
        });

        stopBtn.addEventListener('click', () => {
            synth.cancel();
            stopAmbientSound();
            isPlaying = false;
            isPaused = false;
            currentChunkIndex = 0; 
            playerStatus.innerText = "Stopped";
            updatePlayButtonUI();
        });

        backBtn.addEventListener('click', () => {
            synth.cancel();
            stopAmbientSound();
            isPlaying = false;
            playerScreen.classList.add('hidden');
            playerScreen.classList.remove('flex');
            setupScreen.classList.remove('hidden');
            setupStatus.innerText = "";
        });

        function speakCurrentChunk() {
            if (!isPlaying) return; 
            if (currentChunkIndex >= storyChunks.length) {
                isPlaying = false;
                stopAmbientSound(); 
                playerStatus.innerText = "Story complete. Sweet dreams.";
                updatePlayButtonUI();
                return;
            }

            const textToSpeak = storyChunks[currentChunkIndex].trim();
            if (!textToSpeak || textToSpeak.length <= 1) {
                currentChunkIndex++;
                speakCurrentChunk();
                return;
            }

            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            
            const savedVoiceURI = localStorage.getItem('gemini_selected_voice');
            if (savedVoiceURI && voices.length > 0) {
                const selectedVoice = voices.find(v => v.voiceURI === savedVoiceURI);
                if (selectedVoice) utterance.voice = selectedVoice;
            }

            utterance.rate = 0.8; 
            utterance.pitch = 0.9;
            utterance.volume = 1.0;

            utterance.onend = () => {
                if (isPlaying) {
                    currentChunkIndex++;
                    speakCurrentChunk();
                }
            };

            utterance.onerror = (e) => {
                if (e.error === 'interrupted' || e.error === 'canceled') return;
                console.error("Audio error:", e);
                if (isPlaying) {
                    currentChunkIndex++;
                    speakCurrentChunk();
                }
            };

            synth.speak(utterance);
        }

        function updatePlayButtonUI() {
            if (isPlaying) {
                playIcon.classList.remove('ph-play');
                playIcon.classList.add('ph-pause');
                playIcon.classList.remove('ml-1'); 
            } else {
                playIcon.classList.remove('ph-pause');
                playIcon.classList.add('ph-play');
                playIcon.classList.add('ml-1'); 
            }
        }

        // --- API Calls ---
        async function getValidModel(apiKey) {
            let cachedModel = localStorage.getItem('gemini_preferred_model');
            if (cachedModel && cachedModel.includes('latest')) {
                localStorage.removeItem('gemini_preferred_model');
                cachedModel = null;
            }
            if (cachedModel) return cachedModel;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            if (!response.ok) throw new Error("Invalid API Key. Check settings.");
            
            const data = await response.json();
            const validModels = data.models.filter(m => 
                m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent')
            );

            if (validModels.length === 0) throw new Error("No text models found on this key.");
            
            const preferredModel = validModels.find(m => m.name.includes('gemini-2.5-flash')) || 
                                   validModels.find(m => m.name.includes('gemini-1.5-flash')) || 
                                   validModels[0];
            
            localStorage.setItem('gemini_preferred_model', preferredModel.name);
            return preferredModel.name;
        }

        async function fetchStoryFromAPI(apiKey, modelName, category) {
            const prompt = `Write a highly descriptive, incredibly slow-paced, and soothing bedtime story for an adult. 
            The category/theme is: ${category}. 
            The goal is for the user to fall asleep while listening. Focus heavily on sensory details, gentle sounds, soft lighting, and a calm, meandering narrative arc with no high stakes or stressful conflict. 
            Make the story extremely long, aiming for at least 5,000 words, maximizing your output length. Use calm, rhythmic sentence structures. Output only the story text. Do not use Markdown formatting like bold or italics. Format into natural, spaced paragraphs.`;

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/${modelName}:generateContent?key=${apiKey}`;

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { maxOutputTokens: 8192, temperature: 0.7 }
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "Failed to generate story.");
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }
        
        window.addEventListener('beforeunload', () => {
            synth.cancel();
            stopAmbientSound();
        });

        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
